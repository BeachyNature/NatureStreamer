version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    formatter: simple
    level: DEBUG

loggers:
  server:
    level: DEBUG
    handlers: [console]
    propagate: no

  streamer:
    level: DEBUG
    handlers: [console]
    propagate: no
